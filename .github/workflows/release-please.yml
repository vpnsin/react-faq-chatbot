name: Release Please

# Maintains a release PR from Conventional Commits; merging it bumps the version,
# updates CHANGELOG.md, creates a GitHub release + tag, and publishes to npm.
# Publish is integrated here (rather than a separate `on: release` workflow)
# because a release created by GITHUB_TOKEN does not trigger other workflows.
# Requires an NPM_TOKEN repo secret (an npm automation token).
#
# Recovery: if the publish step fails (e.g. an expired NPM_TOKEN), rotate the
# secret and re-trigger this workflow manually via the "Run workflow" button.
# The release-please step is idempotent (no-op when release already exists) and
# the publish step runs unconditionally on workflow_dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Publish to npm when a release was just created, or when manually triggered
      # (use workflow_dispatch to recover from a failed publish after rotating NPM_TOKEN).
      - name: Checkout
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v6

      - name: Setup Node
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: npm ci

      - name: Build
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: npm run build --if-present

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
